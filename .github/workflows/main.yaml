name: Track JetBrains Plugins by Build
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python scripts/fetch_all_plugins.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update plugin compatibility snapshot $(date +'%Y-%m-%d')"