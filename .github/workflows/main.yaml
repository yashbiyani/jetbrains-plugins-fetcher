name: Track JetBrains Plugins by Build
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: Fetch all plugins
        run: python scripts/fetch_all_plugins.py
      - name: Create Release and Upload Files
        if: always()
        run: |
          cd releases
          for version_dir in */; do
            version="${version_dir%/}"
            if [ "$version" != "RELEASES.md" ]; then
              # Create zip for this version
              zip -r "${version}.zip" "$version/" -q
            fi
          done
          cd ..
      - name: Publish to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: latest-plugins
          name: Latest JetBrains Plugins
          bodyFile: releases/RELEASES.md
          artifacts: "releases/*.zip"
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}