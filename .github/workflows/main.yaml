name: Track JetBrains Plugins by Build
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: Fetch all plugins
        run: python scripts/fetch_all_plugins.py
      - name: Upload plugin XMLs as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jetbrains-plugins-${{ github.run_number }}
          path: data/
          retention-days: 7